<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/basket.css" />
    <script src="../js/basket.js" defer></script>
  </head>
  <body>
    <header>
      <a href="index.html">
        <h1 class="logo">Book Mall</h1>
      </a>
    </header>
    <nav>
      <ul>
        <li><a href="../html/basket.html">장바구니</a></li>
        <li><a href="#">마이페이지</a></li>
        <li><a class="nav-qna" href="./qna.html">Q&A</a></li>
        <li id="bookRank">1위: 데미안</li>
      </ul>
    </nav>
    <main class="basket-container">
      <!-- 상품 정렬 -->
      <section class="basket-list">
        <section class="basket-item">
          <div class="book-image">이미지</div>

          <div class="book-info">
            <p>책이름1</p>
            <p>저자 : 아무개</p>
            <p>출간일 : 0000년 00월 00일</p>
            <p class="price" date-price="21000">가격 : 21,000원</p>
            <div class="quantity-box">
              <button class="minus-btn">-</button>

              <span class="quantity">1</span>

              <button class="plus-btn">+</button>
            </div>
          </div>
        </section>

        <section class="basket-item">
          <div class="book-image">이미지</div>

          <div class="book-info">
            <p>책이름2</p>
            <p>저자 : 아무개</p>
            <p>출간일 : 0000년 00월 00일</p>
            <p class="price" date-price="17000">가격 : 17,000원</p>
            <div class="quantity-box">
              <button class="minus-btn">-</button>

              <span class="quantity">1</span>

              <button class="plus-btn">+</button>
            </div>
            <p id="bookCountPrice" countPrice="0">상품 합계 : 0원</p>
          </div>
        </section>

        <section class="basket-item">
          <div class="book-image">이미지</div>

          <div class="book-info">
            <p>책이름3</p>
            <p>저자 : 아무개</p>
            <p>출간일 : 0000년 00월 00일</p>
            <p class="price" date-price="15000">가격 : 15,000원</p>
            <div class="quantity-box">
              <button class="minus-btn">-</button>

              <span class="quantity">1</span>

              <button class="plus-btn">+</button>
            </div>
          </div>
        </section>
        <!-- 금액 section -->
        <section class="basket-summary">
          <p>총 금액 : <span id="total-price">0</span>원</p>
          <button type="button" id="">주문하기</button>
        </section>
      </section>
    </main>
    <footer>
      <p class="footer-logo">Book Mall</p>
      <p class="footer-desc">책을 고르는 조용한 방법</p>
      <p class="footer-copyright">© 2026 Book Mall</p>
    </footer>
  </body>
  <script src="../js/common.js"></script>
</html>
