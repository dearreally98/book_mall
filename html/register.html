<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="../css/register.css">
    <script src="../js/register.js" defer></script>
</head>
<body>

    <div class="container">
        <div class="join-box">

            <h1>회원가입</h1>

            <div class="input-line">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="이름 입력">
            </div>

            <div class="input-line">
                <label>성별</label>

                <div class="radio-box">
                    <input type="radio" id="male" name="gender" value="남성">
                    <label for="male">남성</label>

                    <input type="radio" id="female" name="gender" value="여성">
                    <label for="female">여성</label>
                </div>
            </div>

            <div class="input-line">
                <label for="userId">아이디</label>
                <input type="text" id="userId" placeholder="아이디 입력">
            </div>

            <div class="input-line">
                <label for="userPw">비밀번호</label>
                <input type="password" id="userPw" placeholder="비밀번호 입력">
            </div>

            <button type="button" id="joinBtn" class="join-btn">회원가입</button>

            <div class="button-box">
                <button type="button" id="toLogin">로그인 페이지</button>
                <button type="button" id="backward">뒤로가기</button>
            </div>

        </div>
    </div>

</body>
</html>
